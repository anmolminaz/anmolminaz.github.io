name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Create .env.local
        run: |
          echo "NOTION_TOKEN=${{ secrets.NOTION_TOKEN }}" > .env.local
          echo "NOTION_RESEARCH_DB_ID=${{ secrets.NOTION_RESEARCH_DB_ID }}" >> .env.local
          echo "NOTION_BLOG_DB_ID=${{ secrets.NOTION_BLOG_DB_ID }}" >> .env.local
          echo "NOTION_ANALYSIS_DB_ID=${{ secrets.NOTION_ANALYSIS_DB_ID }}" >> .env.local
          echo "NOTION_PUBLICATIONS_DB_ID=${{ secrets.NOTION_PUBLICATIONS_DB_ID }}" >> .env.local
          echo "NOTION_PROFILE_DB_ID=${{ secrets.NOTION_PROFILE_DB_ID }}" >> .env.local

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check build output
        run: ls -la out/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4